<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Үздік информатика пәні мұғалімі-2026</title>
    <style>
        :root { 
            --blue: #0088cc;
            --light: #e9ecef;
            --dark: #2d3436;
            --bg: #f4f7f9; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .hub-box { 
            background: white; 
            padding: 40px 40px 0 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
            width: 95%; 
            max-width: 550px; 
            text-align: center; 
            overflow: hidden;
        }

        .title-group {
            margin-bottom: 30px;
        }

        .title-group h3 {
            font-size: 20px;
            color: var(--dark);
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
            line-height: 1.2;
        }

        .title-group h5 {
            font-size: 15px;
            color: #636e72;
            margin: 5px 0 15px 0;
            font-weight: 600;
        }

        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 30px; 
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px; 
            border-radius: 15px; 
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px; 
        }

        .btn svg {
            width: 20px; 
            height: 20px;
            margin-right: 12px;
        }

        .stage-btn { background: var(--blue); color: white; }
        .stage-btn svg { stroke: white; fill: none; }

        .jury-btn { 
            background: var(--light); 
            color: #495057; 
            border: 1px solid #dee2e6;
        }
        .jury-btn svg { stroke: #495057; fill: none; }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .final-footer {
            background-color: #f8f9fa;
            width: calc(100% + 80px);
            margin: 0 -40px;
            padding: 12px 0; 
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .auth-label { 
            font-size: 8px; 
            color: #aeb9ba; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            margin-bottom: 2px; 
        }

        .auth-name { 
            font-size: 13px; 
            color: #495057; 
            margin-bottom: 5px; 
            font-weight: 500;
        }

        .wa-link {
            background-color: transparent; 
            text-decoration: none;
            display: flex;
            margin-top: -12px; /* Ұшақты мәтінге жақындату */
        }
        
        .wa-link svg {
            stroke: #0088cc; 
            fill: none;
            width: 18px; /* Кішірейтілген ұшақ */
            height: 18px; 
            stroke-width: 1.5; /* Жіңішке сызық */

            /* Бүкіл сайтта мәтінді белгілеуге тыйым салу */
            body {
                -webkit-user-select: none;  /* Chrome, Safari, Opera */
                -moz-user-select: none;     /* Firefox */
                -ms-user-select: none;      /* Internet Explorer/Edge */
                user-select: none;          /* Standard */
            }
            
            /* Батырмалар мен сілтемелер үшін де қауіпсіздік */
            .btn, .wa-link, h3, h5, div {
                -webkit-user-drag: none;    /* Суреттер мен элементтерді тартуға тыйым салу */
                user-select: none;
            }
                    }
    </style>
</head>
<body>

<div class="hub-box">
    <div class="title-group">
        <h3>Үздік информатика пәні мұғалімі - 2026</h3>
        <h5>Еңбекшіқазақ ауданы</h5>
        <h3>Лучший учитель информатики - 2026</h3>
        <h5>Енбекшиказахский район</h5>
    </div>

    <div class="btn-group">
        <a href="https://izimbetov8.github.io/inftest/" class="btn stage-btn">1-ЭТАП</a>
        <a href="https://izimbetov8.contest.codeforces.com/enter" class="btn stage-btn">2-ЭТАП</a>
        <a href="https://tiny.cc/UIPMEA-2026" class="btn stage-btn">3-ЭТАП</a>
        
        <div style="margin: 10px 0; border-top: 1px solid #eee;"></div>

        <a href="https://docs.google.com/spreadsheets/d/1D1AXZy-7mSoi1K4iW3Fr7VggDh3YbSdcA4xWjZ19Pq8/edit?usp=sharing" onclick="return checkAccess(event, '2005')" class="btn jury-btn">1-ЭТАП (ЖЮРИ)</a>
        <a href="https://codeforces.com/spectator/ranklist/2bfcc54292a612b4a68bf7691d3ca50e" onclick="return checkAccess(event, '2026')" class="btn jury-btn">2-ЭТАП (ЖЮРИ)</a>
        <a href="https://docs.google.com/spreadsheets/d/1RqwVO1vPh0olgtwVb_9cSIf68qoiEwLF5S7T9jtIiEs/edit?usp=sharing" onclick="return checkAccess(event, '2044')" class="btn jury-btn">3-ЭТАП (ЖЮРИ)</a>
        
        <a href="https://docs.google.com/spreadsheets/d/1t5fbpubhjT4n9GH99wCNwrUU8UglF0WPinZNf98ofZo/edit?usp=sharing" onclick="return checkAccess(event, '2081')" class="btn jury-btn" style="background: #f1f2f6; border-color: #ced4da;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            НӘТИЖЕ / РЕЗУЛЬТАТ
        </a>
    </div>

    <footer class="final-footer">
    <div class="auth-label">Авторлық жоба / Авторский проект</div>
    <div class="auth-name">© Izimbetov Nurlan</div>
    
    <a href="https://wa.me/77057035668" target="_blank" class="wa-link" style="background-color: transparent; text-decoration: none; display: flex; justify-content: center; margin-top: -2px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0088cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
            <path d="M22 2L11 13"></path>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
    </a>
</footer>
</div>

<script>
    // 1. Құпиясөзді тексеру функциясы
    function checkAccess(event, correctPassword) {
        const userPass = prompt("Құпиясөзді енгізіңіз / Введите пароль:");
        
        if (userPass === correctPassword) {
            return true; // Пароль совпал
        } else {
            alert("Құпиясөз қате / Неверный пароль!");
            event.preventDefault(); // Блокируем переход
            return false;
        }
    }

    // 2. Оң жақ батырманы блоктау (Контекстік мәзір)
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    // 3. Ыстық пернелерді блоктау (Ctrl+C, Ctrl+U, F12, т.б.)
    document.onkeydown = function(e) {
        // F12 (Инспекция)
        if (e.keyCode == 123) return false;
        
        // Ctrl+Shift+I (Инспекция)
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        
        // Ctrl+Shift+J (Консоль)
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
        
        // Ctrl+U (Кодты көру)
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        
        // Ctrl+S (Сайтты сақтау)
        if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;

        // Ctrl+C (Көшіру)
        if (e.ctrlKey && e.keyCode == 'C'.charCodeAt(0)) return false;
    };

    // 4. Алмасу буферін (Copy) бұғаттау
    document.addEventListener('copy', function(e) {
        e.clipboardData.setData('text/plain', 'Көшіруге тыйым салынған! / Копирование запрещено!');
        e.preventDefault();
    });

    // 5. PrintScreen басылғанда хабарлама шығару (немесе буферді тазалау)
    window.addEventListener('keyup', function(e) {
        if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText(''); // Буферді өшіру
            alert('Скриншот жасауға тыйым салынады! / Скриншоты запрещены!');
        }
    });

    // 6. Фокустан шыққанда (басқа терезеге өткенде) экранды жасыру әрекеті
    /* Бұл функция пайдаланушы скриншот бағдарламасын ашқанда көмектесуі мүмкін */
    window.onblur = function() {
        document.body.style.filter = "blur(15px)";
    };
    window.onfocus = function() {
        document.body.style.filter = "none";
    };
    
</script>
        
</body>
</html>
