<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Үздік информатика пәні мұғалімі-2026</title>
    <style>
        :root { 
            --blue: #0088cc;
            --light: #e9ecef;
            --dark: #2d3436;
            --bg: #f4f7f9; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .hub-box { 
            background: white; 
            padding: 40px 40px 0 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
            width: 95%; 
            max-width: 550px; 
            text-align: center; 
            overflow: hidden;
        }

        .title-group {
            margin-bottom: 30px;
        }

        .title-group h3 {
            font-size: 22px;
            color: var(--dark);
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
            line-height: 1.2;
        }

        .title-group h5 {
            font-size: 16px;
            color: #636e72;
            margin: 5px 0 15px 0;
            font-weight: 600;
        }

        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 35px; 
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px; 
            border-radius: 15px; 
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 17px; 
        }

        .btn svg {
            width: 22px; 
            height: 22px;
            margin-right: 12px;
        }

        .stage-btn { background: var(--blue); color: white; }
        .stage-btn svg { stroke: white; fill: none; }

        .jury-btn { 
            background: var(--light); 
            color: #495057; 
            border: 1px solid #dee2e6;
        }
        .jury-btn svg { stroke: #495057; fill: none; }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .final-footer {
            background-color: #f8f9fa;
            width: calc(100% + 80px);
            margin: 0 -40px;
            padding: 15px 0; 
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .auth-label { 
            font-size: 9px; 
            color: #aeb9ba; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 2px; 
        }

        .auth-name { 
            font-size: 14px; 
            color: #495057; 
            margin-bottom: 8px; 
            font-weight: 500;
        }

        .wa-link {
            background-color: var(--blue); 
            width: 32px; 
            height: 32px; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        
        .wa-link svg {
    stroke: #0088cc !important; /* Көк түсті мәжбүрлі түрде қолдану */
    fill: none;
    width: 28px;
    height: 28px; 
}
}
        }
    </style>
</head>
<body>

<div class="hub-box">

            1-ЭТАП

        <a href="https://izimbetov8.contest.codeforces.com/enter?back=%2Fgroup%2FdkhQuqe6Oo%2Fcontests" class="btn stage-btn">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>

        <a href="https://docs.google.com/spreadsheets/d/1D1AXZy-7mSoi1K4iW3Fr7VggDh3YbSdcA4xWjZ19Pq8/edit?usp=sharing" onclick="return checkAccess(event)" class="btn jury-btn">
