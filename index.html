<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatics Final Exam</title>
    <style>
        :root { --p: #2980b9; --s: #27ae60; --d: #e74c3c; --g: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--g); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; }
        .box { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; border-top: 6px solid var(--p); }
        .hidden { display: none; }
        input, select { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        #timer { font-size: 28px; font-weight: bold; color: var(--d); border: 3px solid var(--d); padding: 10px 25px; border-radius: 12px; display: inline-block; margin-bottom: 25px; background: #fff5f5; }
        .opt { display: block; text-align: left; padding: 16px; margin: 12px 0; border: 2px solid #f1f2f6; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 17px; }
        .opt:hover { border-color: var(--p); background: #f0f7ff; }
        .sel { border-color: var(--p); background: #e1f0ff; font-weight: bold; }
        .btns { display: flex; justify-content: space-between; gap: 15px; margin-top: 30px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        .b-next { background: var(--p); } .b-prev { background: #95a5a6; } .b-fin { background: var(--s); }
        #v-msg { color: var(--d); font-weight: bold; margin-top: 20px; padding: 12px; background: #fff0f0; border-radius: 8px; border: 1px solid #fab1a0; }
        .already-done { color: var(--d); font-size: 20px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="box">
    <div id="s-start">
        <h2 id="t-title">Информатика: Қорытынды Бақылау</h2>
        <p id="t-desc">Сұрақ: 20 | Уақыт: 30 мин</p>
        <select id="lang" onchange="updateUI()"><option value="kz">Қазақ тілі</option><option value="ru">Русский язык</option></select>
        <input type="text" id="ln" placeholder="Тегі (Фамилия)"><input type="text" id="fn" placeholder="Аты (Имя)">
        <button class="b-next" id="btn-start" onclick="start()">Тестті бастау</button>
    </div>

    <div id="s-test" class="hidden">
        <div id="timer">30:00</div>
        <div style="font-weight: 600; color: #7f8c8d; margin-bottom: 10px;">Сұрақ: <span id="q-i">1</span> / 20</div>
        <h3 id="q-t" style="min-height: 60px; color: #2d3436;"></h3>
        <div id="opts"></div>
        <div class="btns">
            <button id="p-btn" class="b-prev" onclick="move(-1)">Артқа</button>
            <button id="n-btn" class="b-next" onclick="move(1)">Келесі</button>
            <button id="f-btn" class="b-fin hidden" onclick="confirmF()">Аяқтау</button>
        </div>
        <p id="v-msg"><span id="v-label">Бұзушылықтар</span>: <span id="v-c">0</span></p>
    </div>

    <div id="s-res" class="hidden">
        <div id="already-msg" class="already-done hidden"></div>
        <h2 id="t-res-h" style="color:var(--s); font-size: 32px;">Нәтиже</h2>
        <h3 id="r-n"></h3>
        <div id="r-p" style="font-size: 65px; font-weight: bold; color: var(--p); margin: 20px 0;">0%</div>
        <p id="r-b" style="font-size: 22px; font-weight: 500;"></p>
        <p id="r-v" style="color: var(--d); font-weight: bold; font-size: 19px; margin-top: 15px; border: 2px dashed var(--d); padding: 10px; border-radius: 10px; display: inline-block;"></p>
    </div>
</div>

<script>
const ui = {
    kz: { title: "Информатика: Қорытынды Бақылау", desc: "Сұрақ: 20 | Уақыт: 30 мин", start: "Тестті бастау", prev: "Артқа", next: "Келесі", fin: "Аяқтау", viol: "Бұзушылықтар", confirm: "Тестті аяқтауды растайсыз ба?", score: "Жалпы балл", res: "Тест нәтижесі", 
          v1: "ЕСКЕРТУ! Басқа терезеге ауыспаңыз. 1-ші ескерту.", v2: "НАЗАР АУДАРЫҢЫЗ! Келесі жолы -1 балл шегеріледі!", v3: "БҰЗУШЫЛЫҚ! 1 балл шегерілді. Айыппұл: ", timeout: "Уақыт аяқталды!", done: "Сіз бұл тестті тапсырып қойдыңыз!" },
    ru: { title: "Информатика: Итоговый Контроль", desc: "Вопросов: 20 | Время: 30 мин", start: "Начать тест", prev: "Назад", next: "Далее", fin: "Завершить", viol: "Нарушения", confirm: "Вы уверены, что хотите завершить тест?", score: "Общий балл", res: "Результат теста", 
          v1: "ПРЕДУПРЕЖДЕНИЕ! Не переключайте окна. 1-е предупреждение.", v2: "ВНИМАНИЕ! В следующий раз будет снят 1 балл!", v3: "НАРУШЕНИЕ! Снят 1 балл. Текущий штраф: ", timeout: "Время вышло!", done: "Вы уже прошли этот тест!" }
};

const db = {
    kz: [
        {q:"1011(2) екілік саны ондық жүйеде нешеге тең?", a:["9 саны","11 саны","13 саны","15 саны"], c:1},
        {q:"Сегіздік жүйедегі 17(8) санынан кейін тікелей келетін сан?", a:["18 саны","20 саны","21 саны","22 саны"], c:1},
        {q:"Python программалау тілінде қалдықты табу операторы?", a:["// (бүтін бөлу)","% (пайыз белгісі)","** (дәрежелеу)","/ (бөлу)"], c:1},
        {q:"HTML құжатындағы ең үлкен деңгейлі тақырып тегі?", a:["<h6> тегі","<head> тегі","<h1> тегі","<header> тегі"], c:2},
        {q:"Логикалық 'ЖӘНЕ' (AND) амалы қалай аталады?", a:["Дизъюнкция","Конъюнкция","Инверсия","Импликация"], c:1},
        {q:"1 Гбайт (Гигабайт) көлемінде неше Мбайт (Мегабайт) бар?", a:["1000 Мбайт","1024 Мбайт","1048 Мбайт","2048 Мбайт"], c:1},
        {q:"Python-да тізімнің (list) соңына элемент қосу әдісі?", a:["add() әдісі","append() әдісі","insert() әдісі","extend() әдісі"], c:1},
        {q:"Логикалық терістеу (NOT) амалының белгісі?", a:["∧ (Конъюнкция)","∨ (Дизъюнкция)","¬ (Инверсия)","→ (Импликация)"], c:2},
        {q:"Компьютердегі ақпарат өлшеудің ең кіші бірлігі?", a:["1 Байт","1 Килобайт","1 Бит","1 Мегабайт"], c:2},
        {q:"HTML-де гиперсілтеме жасау үшін қолданылатын тег?", a:["<link> тегі","<a> тегі","<href> атрибуты","<nav> тегі"], c:1},
        {q:"Python-да print(2**3) кодының нәтижесі неше болады?", a:["5 саны","6 саны","8 саны","9 саны"], c:2},
        {q:"Сегіздік санау жүйесінің негізі нешеге тең?", a:["2 саны","8 саны","10 саны","16 саны"], c:1},
        {q:"HTML-де кестенің жолын анықтайтын тег?", a:["<td> тегі","<th> тегі","<tr> тегі","<table> тегі"], c:2},
        {q:"A=True, B=False болса, 'A AND B' логикалық амалының мәні?", a:["True (Ақиқат)","False (Жалған)","None (Бос)","Error (Қате)"], c:1},
        {q:"Python-да пайдаланушыдан мәліметтерді енгізуді сұрайтын функция?", a:["print() функциясы","input() функциясы","read() функциясы","get() функциясы"], c:1},
        {q:"HTML файлының стандартты кеңейтілімі қандай?", a:[".txt форматы",".html форматы",".css форматы",".javascript форматы"], c:1},
        {q:"Он алтылық жүйедегі 10(16) саны ондық жүйеде неше болады?", a:["10 саны","16 саны","20 саны","32 саны"], c:1},
        {q:"Компьютердің жедел жады қалай аталады?", a:["ROM жады","RAM жады","HDD дискісі","SSD дискісі"], c:1},
        {q:"Python программалау тілінің авторы кім?", a:["Билл Гейтс","Гвидо ван Россум","Стив Джобс","Марк Цукерберг"], c:1},
        {q:"HTML-де мәтінді келесі жолға көшіруге арналған тег?", a:["<next> тегі","<br> тегі","<hr> тегі","<p> тегі"], c:1}
    ],
    ru: [
        {q:"Чему равно двоичное число 1011(2) в десятичной системе?", a:["Число 9","Число 11","Число 13","Число 15"], c:1},
        {q:"Какое число следует сразу за 17(8) в восьмеричной системе?", a:["Число 18","Число 20","Число 21","Число 22"], c:1},
        {q:"Оператор нахождения остатка от деления в языке Python?", a:["// (целочисленное)","% (процент)","** (степень)","/ (деление)"], c:1},
        {q:"Тег самого крупного заголовка в документе HTML?", a:["Тег <h6>","Тег <head>","Тег <h1>","Тег <header>"], c:2},
        {q:"Как называется логическая операция 'И' (AND)?", a:["Дизъюнкция","Конъюнкция","Инверсия","Импликация"], c:1},
        {q:"Сколько Мбайт (Мегабайт) содержится в 1 Гбайте (Гигабайте)?", a:["1000 Мбайт","1024 Мбайт","1048 Мбайт","2048 Мбайт"], c:1},
        {q:"Метод добавления элемента в конец списка (list) в Python?", a:["Метод add()","Метод append()","Метод insert()","Метод extend()"], c:1},
        {q:"Символ логического отрицания (NOT)?", a:["∧ (Конъюнкция)","∨ (Дизъюнкция)","¬ (Инверсия)","→ (Импликация)"], c:2},
        {q:"Минимальная единица измерения информации в компьютере?", a:["1 Байт","1 Килобайт","1 Бит","1 Мегабайт"], c:2},
        {q:"Тег HTML, используемый для создания гиперссылок?", a:["Тег <link>","Тег <a>","Атрибут <href>","Тег <nav>"], c:1},
        {q:"Результат выполнения кода print(2**3) в Python?", a:["Число 5","Число 6","Число 8","Число 9"], c:2},
        {q:"Чему равно основание восьмеричной системы счисления?", a:["Число 2","Число 8","Число 10","Число 16"], c:1},
        {q:"Тег HTML, определяющий строку таблицы (table row)?", a:["Тег <td>","Тег <th>","Тег <tr>","Тег <table>"], c:2},
        {q:"Если A=True, B=False, чему равно значение 'A AND B'?", a:["True (Истина)","False (Ложь)","None (Пусто)","Error (Ошибка)"], c:1},
        {q:"Функция в Python для ввода данных пользователем с клавиатуры?", a:["Функция print()","Функция input()","Функция read()","Функция get()"], c:1},
        {q:"Стандартное расширение файлов формата HTML?", a:[".txt формат",".html формат",".css формат",".js формат"], c:1},
        {q:"Чему равно число 10(16) в десятичной системе счисления?", a:["Число 10","Число 16","Число 20","Число 32"], c:1},
        {q:"Как называется оперативная память компьютера?", a:["Память ROM","Память RAM","Диск HDD","Диск SSD"], c:1},
        {q:"Кто является создателем языка программирования Python?", a:["Билл Гейтс","Гвидо ван Россум","Стив Джобс","Марк Цукерберг"], c:1},
        {q:"Тег HTML для принудительного переноса строки?", a:["Тег <next>","Тег <br>","Тег <hr>","Тег <p>"], c:1}
    ]
};

let qs=[], cur=0, ans=[], timer, time=1800, viol=0, L='kz', isFinished = false;

function saveState() {
    if(isFinished) return;
    localStorage.setItem('quiz_save', JSON.stringify({ qs, cur, ans, time, viol, L, fn: document.getElementById('fn').value, ln: document.getElementById('ln').value }));
}

window.onload = function() {
    const res = localStorage.getItem('quiz_result');
    if(res) {
        showResult(JSON.parse(res), true);
        return;
    }
    const saved = localStorage.getItem('quiz_save');
    if(saved) {
        const s = JSON.parse(saved);
        qs=s.qs; cur=s.cur; ans=s.ans; time=s.time; viol=s.viol; L=s.L;
        document.getElementById('fn').value=s.fn; document.getElementById('ln').value=s.ln;
        document.getElementById('lang').value=L;
        updateUI(); start(true);
    }
};

function updateUI() {
    L = document.getElementById('lang').value;
    const t = ui[L];
    document.getElementById('t-title').innerText = t.title;
    document.getElementById('t-desc').innerText = t.desc;
    document.getElementById('btn-start').innerText = t.start;
    document.getElementById('p-btn').innerText = t.prev;
    document.getElementById('n-btn').innerText = t.next;
    document.getElementById('f-btn').innerText = t.fin;
    document.getElementById('v-label').innerText = t.viol;
}

function start(isReload = false) {
    if(!isReload) {
        let f=document.getElementById('fn').value.trim(), l=document.getElementById('ln').value.trim();
        if(!f || !l) return alert(L==='kz'?"Аты-жөніңізді жазыңыз!":"Введите ФИО!");
        qs = [...db[L]].sort(()=>0.5-Math.random()).slice(0, 20);
        ans = new Array(20).fill(null);
        time = 1800;
    }
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.remove('hidden');
    if(!timer) timer = setInterval(tick, 1000);
    render();
}

function tick() {
    if(isFinished) return;
    time--;
    let m=Math.floor(time/60), s=time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
    saveState();
    if(time <= 0) { finish(); alert(ui[L].timeout); }
}

function render() {
    document.getElementById('q-i').innerText = cur+1;
    document.getElementById('q-t').innerText = qs[cur].q;
    let b = document.getElementById('opts'); b.innerHTML='';
    qs[cur].a.forEach((o,i)=>{
        let d=document.createElement('div'); d.className='opt'+(ans[cur]===i?' sel':'');
        d.innerText=o; d.onclick=()=>{ans[cur]=i; render(); saveState();}; b.appendChild(d);
    });
    document.getElementById('p-btn').disabled = (cur===0);
    document.getElementById('n-btn').classList.toggle('hidden', cur===19);
    document.getElementById('f-btn').classList.toggle('hidden', cur<19);
    document.getElementById('v-c').innerText = viol;
}

function move(n) { cur+=n; render(); saveState(); }
function confirmF() { if(confirm(ui[L].confirm)) finish(); }

function finish() {
    isFinished = true; clearInterval(timer);
    let rawScore=0; ans.forEach((a,i)=>{if(a===qs[i].c) rawScore++;});
    let penalty = (viol >= 3) ? (viol - 2) : 0;
    let finalScore = Math.max(0, rawScore - penalty);
    let name = document.getElementById('ln').value + " " + document.getElementById('fn').value;
    const resData = { name, finalScore, rawScore, penalty, viol, L_final: L };
    localStorage.setItem('quiz_result', JSON.stringify(resData));
    localStorage.removeItem('quiz_save');
    showResult(resData, false);
}

function showResult(r, alreadyDone) {
    document.getElementById('s-start').classList.add('hidden');
    document.getElementById('s-test').classList.add('hidden');
    document.getElementById('s-res').classList.remove('hidden');
    if(alreadyDone) {
        const msgBox = document.getElementById('already-msg');
        msgBox.innerText = ui[r.L_final].done;
        msgBox.classList.remove('hidden');
    }
    document.getElementById('r-n').innerText = r.name;
    document.getElementById('r-p').innerText = Math.round((r.finalScore/20)*100) + "%";
    document.getElementById('r-b').innerText = ui[r.L_final].score + `: ${r.finalScore} / 20`;
    if(r.penalty > 0 || r.viol > 0) {
        document.getElementById('r-v').innerText = (r.L_final === 'kz' ? "Айыппұл: " : "Штраф: ") + r.penalty + " (" + (r.L_final === 'kz' ? "Бұзушылық: " : "Нарушений: ") + r.viol + ")";
    }
}
document.onkeydown = function(e) {
    // 123 - F12
    // 73 - I (Ctrl+Shift+I)
    // 74 - J (Ctrl+Shift+J)
    // 85 - U (Ctrl+U)
    
    if (e.keyCode == 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || 
        (e.ctrlKey && e.keyCode == 85)) {
        
        // Егер бұл комбинациялар басылса, әрекетті тоқтату
        e.preventDefault();
        return false;
    }
};
window.onblur = function() {
    if(document.getElementById('s-test').classList.contains('hidden') || isFinished || localStorage.getItem('quiz_result')) return;
    viol++; document.getElementById('v-c').innerText = viol; saveState();
    let p = (viol >= 3) ? (viol - 2) : 0;
    let msg = (viol === 1) ? ui[L].v1 : (viol === 2 ? ui[L].v2 : ui[L].v3 + p);
    alert(msg);
}
</script>
</body>
</html>
